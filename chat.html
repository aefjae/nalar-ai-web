<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auri — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dark: #0E0E12;
  --surface: #16161C;
  --surface2: #1E1E26;
  --border: rgba(255,255,255,0.08);
  --text: #F0F0F5;
  --muted: #7A7A8C;
  --accent: #4CAF82;
  --accent-dim: rgba(76,175,130,0.12);
}

html, body {
  height: 100%;
  font-family: 'Cabinet Grotesk', sans-serif;
  background: var(--dark);
  color: var(--text);
  overflow: hidden;
}

/* Layout: flex column, full height */
body { display: flex; flex-direction: column; }

/* ── Top bar ── */
#top-bar {
  flex-shrink: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.char-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.char-avatar-mini {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
}

.char-name-label {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.char-type-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.header-btn {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  text-decoration: none;
  display: inline-block;
}
.header-btn:hover { color: var(--text); background: var(--surface2); }

/* ── Messages area ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}

#messages-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Message rows */
.message { display: flex; gap: 10px; max-width: 100%; }

.message-user {
  flex-direction: row-reverse;
}

.message-avatar {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  flex-shrink: 0;
  margin-top: 2px;
}

.message-assistant .message-avatar {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--accent);
}

.message-user .message-avatar {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.bubble {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}

.message-assistant .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 18px 18px 18px;
  color: var(--text);
}

.message-user .bubble {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: 18px 4px 18px 18px;
  color: var(--text);
}

/* Typing indicator */
#typing {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
  display: none;
}
#typing.visible { display: flex; }

.typing-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 18px 18px 18px;
  padding: 14px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
  margin-left: 42px;
  margin-bottom: 8px;
}

.typing-bubble span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  animation: typing-dot 1.2s ease-in-out infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Empty state */
#empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
#empty-state .empty-avatar {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 900;
  color: var(--accent);
  margin: 0 auto 20px;
}
#empty-state h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}
#empty-state p { font-size: 14px; line-height: 1.6; max-width: 300px; margin: 0 auto; }

/* ── Input area ── */
#input-area {
  flex-shrink: 0;
  padding: 16px 24px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

.input-wrapper {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s;
}
.input-wrapper:focus-within { border-color: rgba(255,255,255,0.2); }

#msg-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  line-height: 1.5;
  max-height: 120px;
  overflow-y: auto;
}
#msg-input::placeholder { color: var(--muted); }

#send-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
#send-btn:hover { filter: brightness(1.15); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  max-width: 720px;
  margin-left: auto;
  margin-right: auto;
}

/* Scrollbar */
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Error toast */
#error-toast {
  position: fixed;
  bottom: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(255,77,77,0.15);
  border: 1px solid rgba(255,77,77,0.3);
  color: #FF4D4D;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  display: none;
  z-index: 100;
}

/* Responsive */
@media (max-width: 600px) {
  #top-bar { padding: 0 16px; }
  #input-area { padding: 12px 16px 16px; }
  .bubble { max-width: 88%; }
}
</style>
</head>
<body>

<!-- Top bar -->
<header id="top-bar">
  <div class="char-info">
    <div class="char-avatar-mini" id="char-avatar-mini">?</div>
    <div>
      <div class="char-name-label" id="char-name-label">Loading...</div>
      <div class="char-type-label" id="char-type-label"></div>
    </div>
  </div>
  <div class="header-actions">
    <a href="character-select.html" class="header-btn">Change companion</a>
    <button class="header-btn" id="signout-btn">Sign out</button>
  </div>
</header>

<!-- Messages -->
<div id="messages">
  <div id="messages-inner">
    <div id="empty-state">
      <div class="empty-avatar" id="empty-avatar">?</div>
      <h3 id="empty-title">Your companion is ready</h3>
      <p id="empty-sub">Say something to get started. Your conversation is saved and your companion remembers everything.</p>
    </div>
  </div>
  <div id="typing">
    <div class="typing-bubble">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div class="input-wrapper">
    <textarea id="msg-input" placeholder="Say something..." rows="1"></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<div id="error-toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const SUPABASE_URL = window.SUPABASE_URL
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY
const { createClient } = window.supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ── Character data ───────────────────────────────────────────────────────────
const CHARS = {
  raze: { name: 'Raze', type: 'Red · Dominant',     accent: '#FF4D4D', accentDim: 'rgba(255,77,77,0.12)',    greeting: "I'm Raze. Let's get into it — what are we working on?" },
  suni: { name: 'Suni', type: 'Yellow · Influencer', accent: '#FFB830', accentDim: 'rgba(255,184,48,0.12)',  greeting: "Suni here!! I'm SO excited to chat with you!! What's on your mind? 🌟" },
  vela: { name: 'Vela', type: 'Green · Steady',      accent: '#4CAF82', accentDim: 'rgba(76,175,130,0.12)', greeting: "Hey, I'm Vela. I'm here whenever you're ready to talk. What's going on?" },
  nox:  { name: 'Nox',  type: 'Blue · Analytical',   accent: '#4D9EFF', accentDim: 'rgba(77,158,255,0.12)', greeting: "Nox online. What would you like to work through today?" }
}

// ── State ────────────────────────────────────────────────────────────────────
let currentSession = null
let currentProfile = null
let messageHistory = []   // sent to the API
let isSending = false

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { window.location.href = 'index.html'; return }
  currentSession = session

  const { data: profile } = await sb
    .from('profiles')
    .select('character')
    .eq('id', session.user.id)
    .single()

  if (!profile?.character) { window.location.href = 'character-select.html'; return }
  currentProfile = profile

  applyTheme(profile.character)
  await loadHistory(profile.character)
}

// ── Theme ────────────────────────────────────────────────────────────────────
function applyTheme(char) {
  const c = CHARS[char]
  const root = document.documentElement
  root.style.setProperty('--accent', c.accent)
  root.style.setProperty('--accent-dim', c.accentDim)

  document.getElementById('char-avatar-mini').textContent = c.name[0]
  document.getElementById('char-avatar-mini').style.background = c.accentDim
  document.getElementById('char-avatar-mini').style.color = c.accent
  document.getElementById('char-avatar-mini').style.border = `1px solid ${c.accent}`
  document.getElementById('char-name-label').textContent = c.name
  document.getElementById('char-type-label').textContent = c.type
  document.getElementById('empty-avatar').textContent = c.name[0]
  document.getElementById('empty-avatar').style.background = c.accentDim
  document.getElementById('empty-avatar').style.color = c.accent
  document.getElementById('empty-avatar').style.border = `1px solid ${c.accent}`
  document.getElementById('empty-title').textContent = `${c.name} is ready`
  document.title = `Auri — ${c.name}`
}

// ── Load history from Supabase ────────────────────────────────────────────────
async function loadHistory(char) {
  const { data: msgs } = await sb
    .from('messages')
    .select('role, content')
    .eq('user_id', currentSession.user.id)
    .order('created_at', { ascending: true })
    .limit(40)

  if (msgs && msgs.length > 0) {
    // Hide empty state
    document.getElementById('empty-state').style.display = 'none'
    messageHistory = msgs.map(m => ({ role: m.role, content: m.content }))
    msgs.forEach(m => renderMessage(m.role, m.content))
    scrollToBottom()
  } else {
    // Show greeting from the AI (not saved — just a visual welcome)
    document.getElementById('empty-sub').textContent = CHARS[char].greeting
  }
}

// ── Render a message bubble ───────────────────────────────────────────────────
function renderMessage(role, content) {
  const inner = document.getElementById('messages-inner')
  const emptyState = document.getElementById('empty-state')
  if (emptyState) emptyState.remove()

  const row = document.createElement('div')
  row.className = `message message-${role}`

  const avatar = document.createElement('div')
  avatar.className = 'message-avatar'

  if (role === 'assistant') {
    const char = currentProfile.character
    const c = CHARS[char]
    avatar.textContent = c.name[0]
    avatar.style.background = c.accentDim
    avatar.style.color = c.accent
    avatar.style.border = `1px solid ${c.accent}`
  } else {
    avatar.textContent = 'U'
  }

  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  bubble.textContent = content

  row.appendChild(avatar)
  row.appendChild(bubble)
  inner.appendChild(row)
}

function scrollToBottom() {
  const el = document.getElementById('messages')
  el.scrollTop = el.scrollHeight
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isSending) return
  const input = document.getElementById('msg-input')
  const text = input.value.trim()
  if (!text) return

  isSending = true
  input.value = ''
  input.style.height = 'auto'
  document.getElementById('send-btn').disabled = true

  // Render user message immediately
  renderMessage('user', text)
  scrollToBottom()

  // Save user message to Supabase
  messageHistory.push({ role: 'user', content: text })
  sb.from('messages').insert({
    user_id: currentSession.user.id,
    role: 'user',
    content: text
  })

  // Show typing indicator
  const typing = document.getElementById('typing')
  typing.classList.add('visible')
  scrollToBottom()

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${currentSession.access_token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        messages: messageHistory,
        character: currentProfile.character
      })
    })

    if (!res.ok) throw new Error(`API error ${res.status}`)

    const data = await res.json()
    const reply = data.content ?? 'Something went wrong. Please try again.'

    typing.classList.remove('visible')
    renderMessage('assistant', reply)
    scrollToBottom()

    // Save AI response to Supabase
    messageHistory.push({ role: 'assistant', content: reply })
    sb.from('messages').insert({
      user_id: currentSession.user.id,
      role: 'assistant',
      content: reply
    })

  } catch (err) {
    typing.classList.remove('visible')
    showToast('Could not reach your companion. Check your connection and try again.')
    // Remove failed user message from history so it can be retried
    messageHistory.pop()
    // Re-populate input so user can retry
    input.value = text
  }

  isSending = false
  document.getElementById('send-btn').disabled = false
  input.focus()
}

// ── Error toast ───────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('error-toast')
  t.textContent = msg
  t.style.display = 'block'
  setTimeout(() => { t.style.display = 'none' }, 4000)
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', sendMessage)

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
})

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function () {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 120) + 'px'
})

document.getElementById('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut()
  window.location.href = 'index.html'
})

// Refresh token if it expires mid-session
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'TOKEN_REFRESHED' && session) {
    currentSession = session
  }
  if (event === 'SIGNED_OUT') {
    window.location.href = 'index.html'
  }
})

init()
</script>
</body>
</html>
